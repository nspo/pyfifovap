name: Python tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check formatting (ruff)
        run: |
          ruff format --check || {
            echo "::error::Code is not formatted. Run 'ruff format' locally and commit the result."
            exit 1
          }

      - name: Lint (ruff check)
        run: |
          ruff check || {
            echo "::error::Lint errors found. Run 'ruff check --fix' locally (review changes) and commit the result."
            exit 1
          }

      - name: Run tests
        run: |
          PYTHONPATH=. pytest
